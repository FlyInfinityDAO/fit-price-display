<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fly Infinity Token - Real-Time Price</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0d1525 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .price-card {
            background: rgba(20, 30, 45, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }
        h1 {
            font-size: 28px;
            font-weight: 600;
            background: linear-gradient(135deg, #fff, #a0b5e0);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #7a8bae;
            margin-bottom: 32px;
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        .price-container {
            background: #0a0f18;
            border-radius: 28px;
            padding: 30px 20px;
            margin-bottom: 30px;
            border: 1px solid #2a3a55;
        }
        .price-label {
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #5a6e8c;
            margin-bottom: 12px;
        }
        .price-value {
            font-size: 56px;
            font-weight: 800;
            color: #7ee0ff;
            text-shadow: 0 0 20px rgba(0,200,255,0.3);
            word-break: break-word;
        }
        .price-unit {
            font-size: 20px;
            color: #8aa0c0;
            margin-left: 5px;
        }
        .method {
            background: #0d1220;
            border-radius: 20px;
            padding: 15px;
            margin-top: 20px;
            border-left: 3px solid #3e6b9e;
            text-align: left;
        }
        .method-title {
            color: #9ab3d5;
            font-size: 12px;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .method-code {
            font-family: monospace;
            color: #bcd0ff;
            font-size: 13px;
            word-break: break-all;
            background: #00000040;
            padding: 8px;
            border-radius: 12px;
        }
        .footer {
            margin-top: 30px;
            font-size: 12px;
            color: #4a5a77;
        }
        .refresh-btn {
            background: #2a3a55;
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.2s;
        }
        .refresh-btn:hover {
            background: #3e5a80;
        }
        .loading {
            opacity: 0.6;
        }
    </style>
    <!-- Ethers.js CDN for blockchain interaction -->
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
</head>
<body>
    <div class="price-card">
        <h1>Fly Infinity Token</h1>
        <div class="subtitle">Bonding Curve Price Oracle</div>

        <div class="price-container">
            <div class="price-label">Current Price</div>
            <div class="price-value" id="fit-price">—</div>
            <div style="margin-top: 5px;">per FIT (in DAI)</div>
        </div>

        <div class="method">
            <div class="method-title">📐 Pricing Mechanism</div>
            <div class="method-code">Price = DAI.reserve / totalSupply</div>
            <div class="method-title" style="margin-top: 10px;">📜 Contract (BSC)</div>
            <div class="method-code">0xBebe4ea7aA4037CeF5D0bc25a10f9dcA16120Dfa</div>
        </div>

        <button class="refresh-btn" id="refreshBtn">⟳ Refresh Price</button>
        <div class="footer">
            Real-time read from Blockchain • Fly Infinity DAO
        </div>
    </div>

    <script>
        // Contract details
        const CONTRACT_ADDRESS = "0xBebe4ea7aA4037CeF5D0bc25a10f9dcA16120Dfa";
        // ABI fragment for Price() function (view)
        const ABI = [
            {
                "constant": true,
                "inputs": [],
                "name": "Price",
                "outputs": [{"name": "", "type": "uint256"}],
                "type": "function"
            }
        ];

        // BSC Mainnet RPC (use public endpoint or a faster one)
        // You can replace this with a more reliable endpoint if needed
        const provider = new ethers.providers.JsonRpcProvider("https://bsc-dataseed.binance.org/");
        const contract = new ethers.Contract(CONTRACT_ADDRESS, ABI, provider);

        async function fetchPrice() {
            const priceElement = document.getElementById("fit-price");
            const btn = document.getElementById("refreshBtn");
            try {
                priceElement.classList.add("loading");
                btn.disabled = true;
                btn.textContent = "Fetching...";

                // Call the Price() function
                const rawPrice = await contract.Price();
                // rawPrice is a BigNumber, we need to format it (18 decimals)
                // Price() returns price in wei (10^18 = 1 DAI)
                const priceInDAI = ethers.utils.formatEther(rawPrice);
                
                // Display with up to 6 decimals for readability
                const displayPrice = parseFloat(priceInDAI).toLocaleString(undefined, {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 8
                });
                
                priceElement.textContent = displayPrice;
                priceElement.classList.remove("loading");
            } catch (error) {
                console.error(error);
                priceElement.textContent = "Error loading";
                priceElement.classList.remove("loading");
            } finally {
                btn.disabled = false;
                btn.textContent = "⟳ Refresh Price";
            }
        }

        // Load price on page load
        fetchPrice();

        // Refresh button event
        document.getElementById("refreshBtn").addEventListener("click", fetchPrice);

        // Optionally auto-refresh every 15 seconds
        setInterval(fetchPrice, 15000);
    </script>
</body>
</html>
