name: Auto Update Airdrop Stats

on:
  schedule:
    - cron: '0 */6 * * *'  # هر ۶ ساعت
  workflow_dispatch:

jobs:
  update-airdrop:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install ethers@5.7.2
      
      - name: Update airdrop stats from blockchain
        run: node update-airdrop.js
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.github.com"
          git add airdrop-stats.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Auto-update airdrop stats [skip ci]"
          git push
