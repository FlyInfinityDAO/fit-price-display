name: Update Trading Volume

on:
  push:
    paths:
      - 'buy.xlsx'
      - 'sell.xlsx'
  schedule:
    - cron: '0 */6 * * *'  # هر ۶ ساعت
  workflow_dispatch:

jobs:
  update-volume:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install xlsx
      
      - name: Calculate and save trading volume
        run: node update-trading-volume.js
      
      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.github.com"
          git add trading-volume.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Auto-update trading volume [skip ci]"
          git push
