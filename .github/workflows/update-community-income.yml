name: Update Community Income

on:
  push:
    paths:
      - 'sell.xlsx'
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-income:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install dependencies
        run: npm install xlsx
      
      - name: Update community income
        run: node update-community-income.js
      
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.github.com"
          git add community-income.json
          git diff --quiet && git diff --staged --quiet || git commit -m "🤖 Update community income [skip ci]"
          git push
