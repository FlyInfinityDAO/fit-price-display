<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Fly Infinity Token - Transactions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-image: url('background-desktop.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        
        @media (max-width: 768px) {
            body {
                background-image: url('background-mobile.png');
                background-size: cover;
                background-position: center top;
                background-repeat: no-repeat;
                background-attachment: scroll;
                padding: 15px;
            }
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 15, 15, 0.75);
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        /* Navigation */
        .nav-bar {
            background: #0F0F0F;
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 15px 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(0, 200, 150, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .nav-links {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            background: transparent;
            border: 1px solid #00C896;
            color: #00C896;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }
        
        .nav-btn.active {
            background: #00C896;
            color: #0F0F0F;
        }
        
        .nav-btn:hover {
            background: #00C896;
            color: #0F0F0F;
            transform: translateY(-2px);
        }
        
        .page-title {
            color: #D4AF37;
            font-size: 20px;
            font-weight: bold;
        }
        
        /* Cards */
        .card {
            background: #0F0F0F;
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(0, 200, 150, 0.2);
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
        }
        
        .card-title {
            font-size: 18px;
            color: #D4AF37;
            margin-bottom: 20px;
            text-align: center;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 200, 150, 0.3);
        }
        
        /* Filter Bar */
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: #1a1a1a;
            border: 1px solid #2a3a55;
            color: #8aa0c0;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .filter-btn:hover {
            border-color: #00C896;
            color: #00C896;
        }
        
        .filter-btn.active {
            background: #00C896;
            border-color: #00C896;
            color: #0F0F0F;
        }
        
        /* Stats Row */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .stat-box {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border-left: 3px solid #00C896;
        }
        
        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #D4AF37;
        }
        
        .stat-label {
            font-size: 12px;
            color: #00C896;
            margin-top: 8px;
        }
        
        /* Transactions Table */
        .tx-table {
            overflow-x: auto;
        }
        
        .tx-table table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .tx-table th, .tx-table td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid #2a3a55;
            color: #c0d0e8;
        }
        
        .tx-table th {
            color: #00C896;
            font-weight: 600;
            font-size: 13px;
        }
        
        .tx-table td {
            font-size: 13px;
            font-family: monospace;
        }
        
        .tx-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }
        
        .tx-type.buy { background: #2e7d64; color: white; }
        .tx-type.sell { background: #9e3e3e; color: white; }
        .tx-type.transfer { background: #3e6b9e; color: white; }
        .tx-type.become_owner { background: #7a5a9e; color: white; }
        .tx-type.reward { background: #f3ba2f; color: #1a1a2e; }
        
        .tx-link {
            color: #D4AF37;
            text-decoration: none;
        }
        
        .tx-link:hover {
            color: #00C896;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #00C896;
        }
        
        .error {
            text-align: center;
            padding: 50px;
            color: #D4AF37;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            align-items: center;
        }
        
        .page-btn {
            background: #1a1a1a;
            border: 1px solid #00C896;
            color: #00C896;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .page-btn:hover {
            background: #00C896;
            color: #0F0F0F;
        }
        
        .page-btn.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .page-info {
            color: #8aa0c0;
            font-size: 13px;
        }
        
        .refresh-btn {
            background: transparent;
            border: 1px solid #00C896;
            color: #00C896;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .footer {
            text-align: center;
            font-size: 10px;
            color: #666;
            margin-top: 20px;
        }
        
        .footer a {
            color: #00C896;
            text-decoration: none;
        }
        
        @media (max-width: 768px) {
            .nav-bar {
                flex-direction: column;
                text-align: center;
            }
            .tx-table th, .tx-table td {
                font-size: 10px;
                padding: 8px 6px;
            }
            .stat-number {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Navigation -->
    <div class="nav-bar">
        <div class="page-title">
            <i class="fas fa-chart-line"></i> Fly Infinity Token (FIT)
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-btn"><i class="fas fa-chart-simple"></i> Price Chart</a>
            <a href="transactions.html" class="nav-btn active"><i class="fas fa-history"></i> Transactions</a>
        </div>
    </div>

    <!-- Stats Overview -->
    <div class="stats-row">
        <div class="stat-box">
            <div class="stat-number" id="totalBuyVolume">—</div>
            <div class="stat-label"><i class="fas fa-arrow-down"></i> Total Buy Volume</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="totalSellVolume">—</div>
            <div class="stat-label"><i class="fas fa-arrow-up"></i> Total Sell Volume</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="totalTxCount">—</div>
            <div class="stat-label"><i class="fas fa-exchange-alt"></i> Total Transactions</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="avgTxValue">—</div>
            <div class="stat-label"><i class="fas fa-chart-line"></i> Avg Transaction Value</div>
        </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">📋 All</button>
        <button class="filter-btn" data-filter="Buy">🟢 Buy</button>
        <button class="filter-btn" data-filter="Sell">🔴 Sell</button>
        <button class="filter-btn" data-filter="Transfer">🔄 Transfer</button>
        <button class="filter-btn" data-filter="Become_Owner">👑 Become Owner</button>
        <button class="filter-btn" data-filter="Reward">🎁 Reward</button>
    </div>

    <!-- Transactions Table -->
    <div class="card">
        <div class="card-title">
            <i class="fas fa-list"></i> Transaction History
        </div>
        <div id="txTableContainer">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i> Loading transactions from BscScan...
            </div>
        </div>
        <div class="pagination" id="pagination" style="display: none;">
            <button class="page-btn" id="prevPage"><i class="fas fa-chevron-left"></i> Previous</button>
            <span class="page-info" id="pageInfo">Page 1</span>
            <button class="page-btn" id="nextPage">Next <i class="fas fa-chevron-right"></i></button>
        </div>
        <div style="text-align: center; margin-top: 15px;">
            <button class="refresh-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh Data</button>
        </div>
    </div>

    <div class="footer">
        Powered by <a href="https://etherscan.io/" target="_blank">Etherscan API V2</a> • Fly Infinity DAO
    </div>
</div>

<script>
    // ==================== CONFIGURATION ====================
    const CONTRACT_ADDRESS = "0xBebe4ea7aA4037CeF5D0bc25a10f9dcA16120Dfa";
    const ETHERSCAN_API_KEY = "YOUR_API_KEY_HERE";  // 🔴 کلید API خود را اینجا وارد کنید
    const BSC_CHAIN_ID = 56;  // BSC Mainnet
    
    let allTransactions = [];
    let filteredTransactions = [];
    let currentPage = 1;
    let currentFilter = "all";
    const ITEMS_PER_PAGE = 15;
    
    // Event signatures برای تشخیص نوع تراکنش
    const EVENT_SIGNATURES = {
        Transfer: "0xddf252ad1be2c89b69c2b068fc378daa952ba7f163c4a11628f55a4df523b3ef",
        Approval: "0x8c5be1e5ebec7d5bd14f71427d1e84f3dd0314c0f7b2291e5b200ac8c7c3b925"
    };
    
    // ==================== Fetch Transactions from Etherscan API V2 ====================
    async function fetchTransactions(page = 1) {
        const container = document.getElementById("txTableContainer");
        container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Fetching transactions from BscScan...</div>';
        
        try {
            // استفاده از Etherscan API V2 برای دریافت تراکنش‌های توکن
            // منبع: https://docs.etherscan.io/api-reference/endpoint/tokentx
            const url = `https://api.etherscan.io/v2/api?chainid=${BSC_CHAIN_ID}&module=account&action=tokentx&contractaddress=${CONTRACT_ADDRESS}&page=${page}&offset=50&sort=desc&apikey=${ETHERSCAN_API_KEY}`;
            
            console.log("Fetching from:", url);
            const response = await fetch(url);
            const data = await response.json();
            
            console.log("API Response:", data);
            
            if (data.status !== "1") {
                throw new Error(data.message || "Failed to fetch transactions");
            }
            
            if (!data.result || data.result.length === 0) {
                container.innerHTML = '<div class="error"><i class="fas fa-info-circle"></i> No transactions found</div>';
                return [];
            }
            
            // پردازش تراکنش‌ها
            const processed = data.result.map(tx => processTransaction(tx));
            return processed;
            
        } catch(e) {
            console.error("Error fetching transactions:", e);
            container.innerHTML = `<div class="error"><i class="fas fa-exclamation-triangle"></i> Error: ${e.message}<br><small>Please check your API key and try again</small></div>`;
            return [];
        }
    }
    
    // ==================== پردازش تراکنش و تشخیص نوع ====================
    function processTransaction(tx) {
        // استخراج اطلاعات پایه
        const hash = tx.hash;
        const from = tx.from;
        const to = tx.to;
        const amount = parseFloat(tx.value) / 1e18;  // تبدیل از Wei به FIT (18 decimals)
        const timestamp = parseInt(tx.timeStamp);
        const date = new Date(timestamp * 1000).toLocaleString();
        
        // تشخیص نوع تراکنش بر اساس آدرس‌ها
        let type = "Transfer";
        let typeIcon = "🔄";
        
        // بررسی Buy (دریافت توکن از قرارداد به آدرس جدید)
        if (to.toLowerCase() === CONTRACT_ADDRESS.toLowerCase() && amount > 0) {
            // این سناریو معمولاً Sell است (ارسال توکن به قرارداد)
            type = "Sell";
            typeIcon = "🔴";
        } else if (from.toLowerCase() === CONTRACT_ADDRESS.toLowerCase() && amount > 0) {
            // ارسال توکن از قرارداد = Buy
            type = "Buy";
            typeIcon = "🟢";
        }
        
        // بررسی Become Owner و Reward از input data
        if (tx.input && tx.input !== "0x") {
            const methodId = tx.input.substring(0, 10);
            // Become Owner function signature (تخمینی)
            if (methodId === "0xd9d1ceca" || methodId === "0xbecomeowner") {
                type = "Become_Owner";
                typeIcon = "👑";
            }
            // Reward function signature (تخمینی)
            if (methodId === "0x6b7c6b1a" || methodId === "0xreward") {
                type = "Reward";
                typeIcon = "🎁";
            }
        }
        
        return {
            hash,
            hashShort: hash.substring(0, 10) + "..." + hash.substring(58),
            from,
            fromShort: from.substring(0, 8) + "..." + from.substring(38),
            to,
            toShort: to.substring(0, 8) + "..." + to.substring(38),
            amount,
            timestamp,
            date,
            type,
            typeIcon,
            raw: tx
        };
    }
    
    // ==================== محاسبه آمار ====================
    function calculateStats(transactions) {
        let totalBuy = 0;
        let totalSell = 0;
        
        transactions.forEach(tx => {
            if (tx.type === "Buy") totalBuy += tx.amount;
            if (tx.type === "Sell") totalSell += tx.amount;
        });
        
        const totalTx = transactions.length;
        const avgValue = totalTx > 0 ? (totalBuy + totalSell) / totalTx : 0;
        
        document.getElementById("totalBuyVolume").innerHTML = totalBuy.toLocaleString(undefined, {maximumFractionDigits: 2}) + " FIT";
        document.getElementById("totalSellVolume").innerHTML = totalSell.toLocaleString(undefined, {maximumFractionDigits: 2}) + " FIT";
        document.getElementById("totalTxCount").innerHTML = totalTx.toLocaleString();
        document.getElementById("avgTxValue").innerHTML = avgValue.toLocaleString(undefined, {maximumFractionDigits: 4}) + " FIT";
    }
    
    // ==================== اعمال فیلتر ====================
    function applyFilter() {
        if (currentFilter === "all") {
            filteredTransactions = [...allTransactions];
        } else {
            filteredTransactions = allTransactions.filter(tx => tx.type === currentFilter);
        }
        currentPage = 1;
        renderTable();
    }
    
    // ==================== رندر جدول ====================
    function renderTable() {
        const container = document.getElementById("txTableContainer");
        const start = (currentPage - 1) * ITEMS_PER_PAGE;
        const end = start + ITEMS_PER_PAGE;
        const pageItems = filteredTransactions.slice(start, end);
        
        if (pageItems.length === 0) {
            container.innerHTML = '<div class="error"><i class="fas fa-info-circle"></i> No transactions match the selected filter</div>';
            document.getElementById("pagination").style.display = "none";
            return;
        }
        
        let html = `<div class="tx-table">
            <table>
                <thead>
                    <tr>
                        <th>Type</th>
                        <th>Tx Hash</th>
                        <th>From</th>
                        <th>To</th>
                        <th>Amount (FIT)</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody>`;
        
        pageItems.forEach(tx => {
            let typeClass = "";
            if (tx.type === "Buy") typeClass = "buy";
            else if (tx.type === "Sell") typeClass = "sell";
            else if (tx.type === "Transfer") typeClass = "transfer";
            else if (tx.type === "Become_Owner") typeClass = "become_owner";
            else if (tx.type === "Reward") typeClass = "reward";
            
            html += `
                <tr>
                    <td><span class="tx-type ${typeClass}">${tx.typeIcon} ${tx.type}</span></td>
                    <td><a href="https://bscscan.com/tx/${tx.hash}" target="_blank" class="tx-link">${tx.hashShort}</a></td>
                    <td><a href="https://bscscan.com/address/${tx.from}" target="_blank" class="tx-link">${tx.fromShort}</a></td>
                    <td><a href="https://bscscan.com/address/${tx.to}" target="_blank" class="tx-link">${tx.toShort}</a></td>
                    <td>${tx.amount.toLocaleString(undefined, {maximumFractionDigits: 4})}</td>
                    <td>${tx.date}</td>
                </tr>
            `;
        });
        
        html += `</tbody></table></div>`;
        container.innerHTML = html;
        
        // Pagination controls
        const totalPages = Math.ceil(filteredTransactions.length / ITEMS_PER_PAGE);
        document.getElementById("pageInfo").innerHTML = `Page ${currentPage} of ${totalPages}`;
        document.getElementById("prevPage").classList.toggle("disabled", currentPage === 1);
        document.getElementById("nextPage").classList.toggle("disabled", currentPage === totalPages);
        document.getElementById("pagination").style.display = "flex";
    }
    
    // ==================== Refresh All Data ====================
    async function refreshData() {
        const container = document.getElementById("txTableContainer");
        container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Fetching transactions from BscScan...</div>';
        
        const transactions = await fetchTransactions();
        if (transactions.length > 0) {
            allTransactions = transactions;
            applyFilter();
            calculateStats(allTransactions);
        }
    }
    
    // ==================== Event Listeners ====================
    document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentFilter = btn.dataset.filter;
            applyFilter();
        });
    });
    
    document.getElementById("prevPage").addEventListener("click", () => {
        const totalPages = Math.ceil(filteredTransactions.length / ITEMS_PER_PAGE);
        if (currentPage > 1) {
            currentPage--;
            renderTable();
        }
    });
    
    document.getElementById("nextPage").addEventListener("click", () => {
        const totalPages = Math.ceil(filteredTransactions.length / ITEMS_PER_PAGE);
        if (currentPage < totalPages) {
            currentPage++;
            renderTable();
        }
    });
    
    document.getElementById("refreshBtn").addEventListener("click", refreshData);
    
    // ==================== INITIALIZATION ====================
    if (ETHERSCAN_API_KEY === "YOUR_API_KEY_HERE") {
        document.getElementById("txTableContainer").innerHTML = '<div class="error"><i class="fas fa-key"></i> Please add your Etherscan API key to the code.<br><small>Get one from: https://etherscan.io/</small></div>';
    } else {
        refreshData();
        // Auto-refresh every 60 seconds
        setInterval(refreshData, 60000);
    }
</script>
</body>
</html>
