<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Fly Infinity Token - Transactions</title>
    <script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background-image: url('background-desktop.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        
        @media (max-width: 768px) {
            body {
                background-image: url('background-mobile.png');
                background-size: cover;
                background-position: center top;
                background-repeat: no-repeat;
                background-attachment: scroll;
                padding: 15px;
            }
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 15, 15, 0.75);
            pointer-events: none;
            z-index: 0;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        .nav-bar {
            background: #0F0F0F;
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 15px 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(0, 200, 150, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .nav-links {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .nav-btn {
            background: transparent;
            border: 1px solid #00C896;
            color: #00C896;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }
        
        .nav-btn.active {
            background: #00C896;
            color: #0F0F0F;
        }
        
        .nav-btn:hover {
            background: #00C896;
            color: #0F0F0F;
            transform: translateY(-2px);
        }
        
        .page-title {
            color: #D4AF37;
            font-size: 20px;
            font-weight: bold;
        }
        
        .card {
            background: #0F0F0F;
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(0, 200, 150, 0.2);
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
        }
        
        .card-title {
            font-size: 18px;
            color: #D4AF37;
            margin-bottom: 20px;
            text-align: center;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(0, 200, 150, 0.3);
        }
        
        .filter-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }
        
        .filter-btn {
            background: #1a1a1a;
            border: 1px solid #2a3a55;
            color: #8aa0c0;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .filter-btn:hover {
            border-color: #00C896;
            color: #00C896;
        }
        
        .filter-btn.active {
            background: #00C896;
            border-color: #00C896;
            color: #0F0F0F;
        }
        
        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 25px;
        }
        
        .stat-box {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border-left: 3px solid #00C896;
        }
        
        .stat-number {
            font-size: 28px;
            font-weight: bold;
            color: #D4AF37;
        }
        
        .stat-label {
            font-size: 12px;
            color: #00C896;
            margin-top: 8px;
        }
        
        .tx-table {
            overflow-x: auto;
        }
        
        .tx-table table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .tx-table th, .tx-table td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid #2a3a55;
            color: #c0d0e8;
        }
        
        .tx-table th {
            color: #00C896;
            font-weight: 600;
            font-size: 13px;
        }
        
        .tx-table td {
            font-size: 13px;
            font-family: monospace;
        }
        
        .tx-type {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }
        
        .tx-type.buy { background: #2e7d64; color: white; }
        .tx-type.sell { background: #9e3e3e; color: white; }
        .tx-type.transfer { background: #3e6b9e; color: white; }
        
        .tx-link {
            color: #D4AF37;
            text-decoration: none;
        }
        
        .tx-link:hover {
            color: #00C896;
        }
        
        .loading {
            text-align: center;
            padding: 50px;
            color: #00C896;
        }
        
        .error {
            text-align: center;
            padding: 50px;
            color: #D4AF37;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            align-items: center;
        }
        
        .page-btn {
            background: #1a1a1a;
            border: 1px solid #00C896;
            color: #00C896;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .page-btn:hover {
            background: #00C896;
            color: #0F0F0F;
        }
        
        .page-btn.disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        
        .page-info {
            color: #8aa0c0;
            font-size: 13px;
        }
        
        .refresh-btn {
            background: transparent;
            border: 1px solid #00C896;
            color: #00C896;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .footer {
            text-align: center;
            font-size: 10px;
            color: #666;
            margin-top: 20px;
        }
        
        .footer a {
            color: #00C896;
            text-decoration: none;
        }
        
        @media (max-width: 768px) {
            .nav-bar {
                flex-direction: column;
                text-align: center;
            }
            .tx-table th, .tx-table td {
                font-size: 10px;
                padding: 8px 6px;
            }
            .stat-number {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="nav-bar">
        <div class="page-title">
            <i class="fas fa-chart-line"></i> Fly Infinity Token (FIT)
        </div>
        <div class="nav-links">
            <a href="index.html" class="nav-btn"><i class="fas fa-chart-simple"></i> Price Chart</a>
            <a href="transactions.html" class="nav-btn active"><i class="fas fa-history"></i> Transactions</a>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-box">
            <div class="stat-number" id="totalBuyVolume">—</div>
            <div class="stat-label"><i class="fas fa-arrow-down"></i> Total Buy Volume</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="totalSellVolume">—</div>
            <div class="stat-label"><i class="fas fa-arrow-up"></i> Total Sell Volume</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="totalTxCount">—</div>
            <div class="stat-label"><i class="fas fa-exchange-alt"></i> Total Transactions</div>
        </div>
        <div class="stat-box">
            <div class="stat-number" id="avgTxValue">—</div>
            <div class="stat-label"><i class="fas fa-chart-line"></i> Avg Transaction Value</div>
        </div>
    </div>

    <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">📋 All</button>
        <button class="filter-btn" data-filter="Buy">🟢 Buy</button>
        <button class="filter-btn" data-filter="Sell">🔴 Sell</button>
        <button class="filter-btn" data-filter="Transfer">🔄 Transfer</button>
    </div>

    <div class="card">
        <div class="card-title">
            <i class="fas fa-list"></i> Transaction History
        </div>
        <div id="txTableContainer">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i> Loading transactions...
            </div>
        </div>
        <div class="pagination" id="pagination" style="display: none;">
            <button class="page-btn" id="prevPage"><i class="fas fa-chevron-left"></i> Previous</button>
            <span class="page-info" id="pageInfo">Page 1</span>
            <button class="page-btn" id="nextPage">Next <i class="fas fa-chevron-right"></i></button>
        </div>
        <div style="text-align: center; margin-top: 15px;">
            <button class="refresh-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i> Refresh Data</button>
        </div>
    </div>

    <div class="footer">
        Powered by <a href="https://goldrush.dev/" target="_blank">GoldRush (Covalent)</a> • Fly Infinity DAO
    </div>
</div>

<script>
    // ==================== CONFIGURATION ====================
    const CONTRACT_ADDRESS = "0xBebe4ea7aA4037CeF5D0bc25a10f9dcA16120Dfa";
    // 🔴 کلید API خود را از GoldRush (Covalent) در اینجا وارد کنید
    const COVALENT_API_KEY = "cqt_rQT4yHvC37xM7MTYpRtCw63kyX8W";
    const CHAIN_ID = 56; // BSC Mainnet
    
    let allTransactions = [];
    let filteredTransactions = [];
    let currentPage = 1;
    let currentFilter = "all";
    const ITEMS_PER_PAGE = 15;
    
    // ==================== Fetch Transactions from Covalent API (Fixed Endpoint) ====================
    async function fetchTransactions() {
        const container = document.getElementById("txTableContainer");
        container.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Fetching transactions from Covalent API...</div>';
        
        try {
            // اندپوینت صحیح برای دریافت تراکنش‌های توکن
            // بر اساس مستندات Covalent: /v1/{chainId}/tokens/{contractAddress}/transfers_v2/
            const url = `https://api.covalenthq.com/v1/${CHAIN_ID}/tokens/${CONTRACT_ADDRESS}/transfers_v2/?key=${COVALENT_API_KEY}&page-size=100`;
            
            console.log("Fetching from:", url);
            const response = await fetch(url);
            
            if (!response.ok) {
                if (response.status === 401 || response.status === 403) {
                    throw new Error("Invalid API key or unauthorized access.");
                }
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }
            
            const data = await response.json();
            console.log("API Response:", data);
            
            if (data.error) {
                throw new Error(data.error_message || "API returned an error");
            }
            
            if (!data.data || !data.data.items) {
                container.innerHTML = '<div class="error"><i class="fas fa-info-circle"></i> No transactions found</div>';
                return [];
            }
            
            const transfers = data.data.items;
            
            if (transfers.length === 0) {
                container.innerHTML = '<div class="error"><i class="fas fa-info-circle"></i> No transactions found</div>';
                return [];
            }
            
            const processed = transfers.map(tx => processTransaction(tx));
            return processed;
            
        } catch(e) {
            console.error("Error fetching transactions:", e);
            container.innerHTML = `<div class="error"><i class="fas fa-exclamation-triangle"></i> Error: ${e.message}<br><br>
            <strong>Check your Covalent API key.</strong><br>
            <small>Get a free key from: <a href="https://goldrush.dev/" target="_blank" style="color:#00C896;">goldrush.dev</a></small>
            </div>`;
            return [];
        }
    }
    
    // ==================== پردازش تراکنش ====================
    function processTransaction(tx) {
        const hash = tx.tx_hash;
        const from = tx.from_address;
        const to = tx.to_address;
        const value = parseFloat(tx.delta) / 1e18;
        const timestamp = tx.block_signed_at ? new Date(tx.block_signed_at).getTime() / 1000 : Date.now() / 1000;
        const date = new Date(timestamp * 1000).toLocaleString();
        
        let type = "Transfer";
        let typeIcon = "🔄";
        
        if (from.toLowerCase() === CONTRACT_ADDRESS.toLowerCase()) {
            type = "Buy";
            typeIcon = "🟢";
        } else if (to.toLowerCase() === CONTRACT_ADDRESS.toLowerCase()) {
            type = "Sell";
            typeIcon = "🔴";
        }
        
        return {
            hash,
            hashShort: hash.substring(0, 10) + "..." + hash.substring(58),
            from,
            fromShort: from.substring(0, 8) + "..." + from.substring(38),
            to,
            toShort: to.substring(0, 8) + "..." + to.substring(38),
            amount: value,
            date,
            type,
            typeIcon
        };
    }
    
    function calculateStats(transactions) {
        let totalBuy = 0;
        let totalSell = 0;
        
        transactions.forEach(tx => {
            if (tx.type === "Buy") totalBuy += tx.amount;
            if (tx.type === "Sell") totalSell += tx.amount;
        });
        
        const totalTx = transactions.length;
        const avgValue = totalTx > 0 ? (totalBuy + totalSell) / totalTx : 0;
        
        document.getElementById("totalBuyVolume").innerHTML = totalBuy.toFixed(4) + " FIT";
        document.getElementById("totalSellVolume").innerHTML = totalSell.toFixed(4) + " FIT";
        document.getElementById("totalTxCount").innerHTML = totalTx.toLocaleString();
        document.getElementById("avgTxValue").innerHTML = avgValue.toFixed(6) + " FIT";
    }
    
    function applyFilter() {
        if (currentFilter === "all") {
            filteredTransactions = [...allTransactions];
        } else {
            filteredTransactions = allTransactions.filter(tx => tx.type === currentFilter);
        }
        currentPage = 1;
        renderTable();
    }
    
    function renderTable() {
        const container = document.getElementById("txTableContainer");
        const start = (currentPage - 1) * ITEMS_PER_PAGE;
        const end = start + ITEMS_PER_PAGE;
        const pageItems = filteredTransactions.slice(start, end);
        
        if (pageItems.length === 0) {
            container.innerHTML = '<div class="error"><i class="fas fa-info-circle"></i> No transactions match the selected filter</div>';
            document.getElementById("pagination").style.display = "none";
            return;
        }
        
        let html = `<div class="tx-table">
            </table>
                <thead>
                    <tr>
                        <th>Type</th>
                        <th>Tx Hash</th>
                        <th>From</th>
                        <th>To</th>
                        <th>Amount (FIT)</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody>`;
        
        pageItems.forEach(tx => {
            let typeClass = "";
            if (tx.type === "Buy") typeClass = "buy";
            else if (tx.type === "Sell") typeClass = "sell";
            else typeClass = "transfer";
            
            html += `
                <tr>
                    <td><span class="tx-type ${typeClass}">${tx.typeIcon} ${tx.type}</span></td>
                    <td><a href="https://bscscan.com/tx/${tx.hash}" target="_blank" class="tx-link">${tx.hashShort}</a></td>
                    <td><a href="https://bscscan.com/address/${tx.from}" target="_blank" class="tx-link">${tx.fromShort}</a></td>
                    <td><a href="https://bscscan.com/address/${tx.to}" target="_blank" class="tx-link">${tx.toShort}</a></td>
                    <td>${tx.amount.toFixed(6)}</td>
                    <td>${tx.date}</td>
                </tr>
            `;
        });
        
        html += `</tbody></table></div>`;
        container.innerHTML = html;
        
        const totalPages = Math.ceil(filteredTransactions.length / ITEMS_PER_PAGE);
        document.getElementById("pageInfo").innerHTML = `Page ${currentPage} of ${totalPages}`;
        document.getElementById("prevPage").classList.toggle("disabled", currentPage === 1);
        document.getElementById("nextPage").classList.toggle("disabled", currentPage === totalPages);
        document.getElementById("pagination").style.display = "flex";
    }
    
    async function refreshData() {
        const transactions = await fetchTransactions();
        if (transactions.length > 0) {
            allTransactions = transactions;
            applyFilter();
            calculateStats(allTransactions);
        }
    }
    
    document.querySelectorAll(".filter-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            document.querySelectorAll(".filter-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            currentFilter = btn.dataset.filter;
            applyFilter();
        });
    });
    
    document.getElementById("prevPage").addEventListener("click", () => {
        const totalPages = Math.ceil(filteredTransactions.length / ITEMS_PER_PAGE);
        if (currentPage > 1) {
            currentPage--;
            renderTable();
        }
    });
    
    document.getElementById("nextPage").addEventListener("click", () => {
        const totalPages = Math.ceil(filteredTransactions.length / ITEMS_PER_PAGE);
        if (currentPage < totalPages) {
            currentPage++;
            renderTable();
        }
    });
    
    document.getElementById("refreshBtn").addEventListener("click", refreshData);
    
    if (COVALENT_API_KEY === "YOUR_COVALENT_API_KEY_HERE") {
        document.getElementById("txTableContainer").innerHTML = '<div class="error"><i class="fas fa-key"></i> Please add your Covalent API key to the code.<br><small>Get a free key from: <a href="https://goldrush.dev/" target="_blank" style="color:#00C896;">goldrush.dev</a></small></div>';
    } else {
        refreshData();
        setInterval(refreshData, 60000);
    }
</script>
</body>
</html>
