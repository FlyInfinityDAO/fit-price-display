<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Fly Infinity DAO</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0F0F0F;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #c0d0e8;
        }
        .offline-container {
            text-align: center;
            max-width: 500px;
            padding: 40px;
            background: #1a1a1a;
            border-radius: 28px;
            border: 1px solid rgba(0, 200, 150, 0.2);
        }
        .offline-icon {
            font-size: 80px;
            color: #D4AF37;
            margin-bottom: 20px;
        }
        h1 {
            color: #D4AF37;
            font-size: 28px;
            margin-bottom: 15px;
        }
        p {
            color: #888;
            font-size: 16px;
            line-height: 1.8;
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #00C896, #008a6a);
            border: none;
            color: white;
            padding: 14px 32px;
            border-radius: 48px;
            font-size: 16px;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 200, 150, 0.3);
        }
        .retry-btn {
            background: transparent;
            border: 1px solid #D4AF37;
            color: #D4AF37;
            margin-left: 10px;
        }
        .retry-btn:hover {
            background: #D4AF37;
            color: #0F0F0F;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>You're Offline</h1>
        <p>
            Please check your internet connection.<br>
            Some features may not be available offline.
        </p>
        <div>
            <button class="btn" onclick="location.reload()">
                <i class="fas fa-sync-alt"></i> Try Again
            </button>
            <a href="/" class="btn retry-btn">
                <i class="fas fa-home"></i> Home
            </a>
        </div>
    </div>
</body>
</html>
